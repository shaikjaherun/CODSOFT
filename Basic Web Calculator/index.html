<!--
Project Name: Basic Calculator
Technologies Used: HTML, CSS, JavaScript
Description:
This project is a simple calculator that performs
addition, subtraction, multiplication and division
operations using JavaScript event handling.
-->
<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>

<body>

    <div class="container">

        <h1>CALCULATOR</h1>

        <div class="calculator">

            <input type="text" id="display" disabled>

            <div class="buttons">
            <button onclick="ClrDis()">AC</button>
            <button onclick="DelLast()">Del</button>
            <button onclick="btnClick('/')">÷</button>
            <button onclick="btnClick('*')">*</button>

            <button onclick="btnClick('7')">7</button>
            <button onclick="btnClick('8')">8</button>
            <button onclick="btnClick('9')">9</button>
            <button onclick="btnClick('-')">-</button>

            <button onclick="btnClick('4')">4</button>
            <button onclick="btnClick('5')">5</button>
            <button onclick="btnClick('6')">6</button>
            <button onclick="btnClick('+')">+</button>

            <button onclick="btnClick('1')">1</button>
            <button onclick="btnClick('2')">2</button>
            <button onclick="btnClick('3')">3</button>
            <button onclick="calculate()">=</button>

            <button onclick="btnClick('0')" class="zero">0</button>
            <button onclick="btnClick('.')">.</button>
            </div>

        </div>

    </div>

<script src="cal.js"></script>

</body>
</html>
